name: Latest Blog Posts

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://nineliveszerotrust.com/index.xml"
          max_post_count: "5"
          template: "[$title]($url) - $description"
          description_max_length: "120"
          commit_message: "Update latest blog posts"
